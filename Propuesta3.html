<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRASLACIÓN, ROTACIÓN Y ESCALADO</title>
<style>
body {
margin: 0;
overflow: hidden;
font-family: 'Courier New', Courier, monospace; /* Fuente estilo código */
}
#info { 
position: absolute;
top: 10px;
left: 10px;
background: rgba(255, 255, 255, 0.9); /* Fondo blanco sólido */
padding: 15px;
border-radius: 0px; /* Bordes rectos */
font-size: 14px;
border-left: 5px solid #00d4ff; /* Barra lateral decorativa */
box-shadow: 5px 5px 15px rgba(0,0,0,0.3);
}
</style>
</head>
<body>
<div id="info">
    <strong style="color: #00d4ff;">PANEL DE CONTROL</strong><br><br>
    FLECHAS: Mover eje X/Y<br>
    Q/E : Rotar eje Y<br>
    Z/X : Escalar tamaño<br>
</div>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script>
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xf0f0f0); // Fondo gris muy claro

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const geometry = new THREE.BoxGeometry(1,1,1);
    // Cambio: Color cian profesional
    const material = new THREE.MeshBasicMaterial({ color: 0x00d4ff }); 
    const cubo = new THREE.Mesh(geometry, material);
    scene.add(cubo);

    // Nota: Se mantuvo la luz aunque el MeshBasicMaterial no la requiera, para no alterar la estructura
    const light = new THREE.PointLight(0xffffff, 1);
    light.position.set(5, 5, 5);
    scene.add(light);

    camera.position.z = 5;

    window.addEventListener('keydown', (event) => {
        switch(event.key) {
            case 'ArrowUp':
                cubo.position.y += 0.2;
                break;
            case 'ArrowDown':
                cubo.position.y -= 0.2;
                break;
            case 'ArrowLeft':
                cubo.position.x -= 0.2;
                break;
            case 'ArrowRight':
                cubo.position.x += 0.2;
                break;
            case 'q':
            case 'Q':
                cubo.rotation.y -= 0.1;
                break;
            case 'e':
            case 'E':
                cubo.rotation.y += 0.1;
                break;
            case 'z':
            case 'Z':
                cubo.scale.x +=0.1;
                cubo.scale.y +=0.1;
                cubo.scale.z +=0.1;
                break;
            case 'x':
                cubo.scale.x = Math.max(0.2, cubo.scale.x  - 0.1);
                cubo.scale.y = Math.max(0.2, cubo.scale.y  - 0.1);
                cubo.scale.z = Math.max(0.2, cubo.scale.z  - 0.1);
                break;
        }
    });

    function animate() {
        requestAnimationFrame(animate);
        renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
