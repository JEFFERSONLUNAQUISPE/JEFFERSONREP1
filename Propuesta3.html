<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Interactivo Multicolor</title>
<style>
body { margin: 0; overflow: hidden; font-family: sans-serif; }
#info { 
    position: absolute; top: 10px; left: 10px;
    background: rgba(255, 255, 255, 0.9); padding: 15px;
    border-radius: 8px; font-size: 14px;
    border-left: 5px solid #e74c3c;
}
</style>
</head>
<body>
<div id="info">
    <strong>CONTROLES MULTICOLOR</strong><br><br>
    FLECHAS: Mover<br>
    Q/E : Rotar<br>
    Z/X : Escalar
</div>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script>
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xecf0f1);

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const geometry = new THREE.BoxGeometry(1,1,1);

    // Colores vivos para las 6 caras
    const materials = [
        new THREE.MeshBasicMaterial({ color: 0xe74c3c }), // Rojo
        new THREE.MeshBasicMaterial({ color: 0x3498db }), // Azul
        new THREE.MeshBasicMaterial({ color: 0xf1c40f }), // Amarillo
        new THREE.MeshBasicMaterial({ color: 0x2ecc71 }), // Verde
        new THREE.MeshBasicMaterial({ color: 0x9b59b6 }), // Púrpura
        new THREE.MeshBasicMaterial({ color: 0xe67e22 })  // Naranja
    ];

    const cubo = new THREE.Mesh(geometry, materials);
    scene.add(cubo);

    camera.position.z = 5;

    window.addEventListener('keydown', (event) => {
        switch(event.key) {
            case 'ArrowUp': cubo.position.y += 0.2; break;
            case 'ArrowDown': cubo.position.y -= 0.2; break;
            case 'ArrowLeft': cubo.position.x -= 0.2; break;
            case 'ArrowRight': cubo.position.x += 0.2; break;
            case 'q': case 'Q': cubo.rotation.y -= 0.1; break;
            case 'e': case 'E': cubo.rotation.y += 0.1; break;
            case 'z': case 'Z':
                cubo.scale.x += 0.1; cubo.scale.y += 0.1; cubo.scale.z += 0.1;
                break;
            case 'x':
                cubo.scale.x = Math.max(0.2, cubo.scale.x - 0.1);
                cubo.scale.y = Math.max(0.2, cubo.scale.y - 0.1);
                cubo.scale.z = Math.max(0.2, cubo.scale.z - 0.1);
                break;
        }
    });

    function animate() {
        requestAnimationFrame(animate);
        renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
