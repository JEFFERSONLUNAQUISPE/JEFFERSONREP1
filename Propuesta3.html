<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRASLACIÓN, ROTACIÓN Y ESCALADO</title>
<style>
#info { 
    background: rgba(20, 20, 20, 0.9); /* Fondo de menú oscuro */
    color: #2ecc71; /* Texto verde esmeralda */
    border: 1px solid #2ecc71;
}
</style>

<script>
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x2c3e50); // Fondo gris azulado

    // ... (Cámara y Renderer)

    const geometry = new THREE.BoxGeometry(1,1,1);
    // Material con color verde y acabado mate
    const material = new THREE.MeshLambertMaterial({ color: 0x27ae60 });
    const cubo = new THREE.Mesh(geometry, material);
    scene.add(cubo);

    // LUZ puntual para resaltar el verde
    const light = new THREE.PointLight(0xffffff, 100);
    light.position.set(3, 3, 3);
    scene.add(light);

    // (Controles de teclado y escalado se mantienen)
</script>


</body>
</html>
