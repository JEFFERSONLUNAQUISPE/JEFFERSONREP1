<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Traslación en eje X</title>
<style>
body {
    margin: 0;
    overflow: hidden;
    background: #121212; /* Fondo oscuro */
}
#info {
    position: absolute;
    top: 10px;
    left: 10px;
    background: rgba(0,0,0,0.7); /* Caja traslúcida negra */
    color: #ffaa00; /* Texto naranja */
    padding: 10px;
    border-radius: 8px;
    font-family: Arial;
    border: 1px solid #ffaa00;
}
</style>
</head>

<body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.z = 5;

const renderer = new THREE.WebGLRenderer({ antialias: true }); // Suavizado de bordes
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const geometry = new THREE.BoxGeometry(1,1,1);
// Cambio: Color sólido naranja en lugar de NormalMaterial
const material = new THREE.MeshBasicMaterial({ color: 0xffaa00 }); 
const cubo = new THREE.Mesh(geometry, material);
scene.add(cubo);

let direccion = 1;     
const velocidad = 0.05;
const limite = 2;

function animate() {
    requestAnimationFrame(animate);
    cubo.position.x += velocidad * direccion;
    if (cubo.position.x > limite || cubo.position.x < -limite) {
        direccion *= -1;
    }
    renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
    renderer.setSize(window.innerWidth, window.innerHeight);
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
});
</script>
</body>
</html>
