<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Traslación en eje X</title>
<style>
body {
    margin: 0;
    overflow: hidden;
}
#info {
    position: absolute;
    top: 10px;
    left: 10px;
    background: rgba(255,255,255,0.8);
    padding: 10px;
    border-radius: 8px;
    font-family: Arial;
}
</style>
</head>

<body>
<!-- THREE.JS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
// ESCENA
const scene = new THREE.Scene();

// CÁMARA
const camera = new THREE.PerspectiveCamera(
    75, window.innerWidth / window.innerHeight, 0.1, 1000
);
camera.position.z = 5;

// RENDER
const renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// CUBO
const geometry = new THREE.BoxGeometry(1,1,1);
const material = new THREE.MeshNormalMaterial();
const cubo = new THREE.Mesh(geometry, material);
scene.add(cubo);

// VARIABLES DE MOVIMIENTO
let direccion = 1;     // 1 = derecha, -1 = izquierda
const velocidad = 0.05;
const limite = 2;

// ANIMACIÓN
function animate() {
    requestAnimationFrame(animate);

    // 🔥 TRASLACIÓN EN EJE X
    cubo.position.x += velocidad * direccion;

    // 🔥 CAMBIO DE DIRECCIÓN EN LOS LÍMITES
    if (cubo.position.x > limite || cubo.position.x < -limite) {
        direccion *= -1;
    }

    renderer.render(scene, camera);
}

animate();

// RESPONSIVE
window.addEventListener('resize', () => {
    renderer.setSize(window.innerWidth, window.innerHeight);
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
});
</script>

</body>
</html>
