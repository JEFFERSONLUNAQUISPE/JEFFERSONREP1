<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>creación de un cuadrado</title>
</head>
<body>
    <h2>Dibujo de un cuadrado</h2>
    <h2>REALIZADO POR : Jefferson Luna Quispe</h2>

    <canvas id="myCanvas" width="500" height="500" style="border:4px solid black;"></canvas>

    <script>
        // OBTENER EL CONTEXTO DE DIBUJO DEL CANVAS
        var canvas = document.getElementById("myCanvas");
        // Se obtiene el contexto de dibujo en 2D
        var ctx = canvas.getContext("2d");
        
        // Comenzar el trazado de una figura
        ctx.beginPath();

        // DIBUJAR EL CUADRADO
        // Parámetros: (x, y, ancho, alto)
        // x: 150, y: 150 (para que quede centrado)
        // ancho: 200, alto: 200 (mismo valor para que sea un cuadrado perfecto)
        ctx.rect(150, 150, 200, 200);

        // Definir el color del relleno
        ctx.fillStyle = "lightblue";
        // Rellenar el cuadrado
        ctx.fill();
        
        // Dibujar el borde del cuadrado
        ctx.strokeStyle = "black";
        ctx.lineWidth = 2;
        ctx.stroke();
    </script>
</body>
</html>
