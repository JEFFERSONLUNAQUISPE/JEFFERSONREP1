<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CREAR UN CUADRADO Y UN TRIÁNGULO</title>
</head>
<body>
    <H2>CREAR UN CUADRADO Y UN TRIÁNGULO</H2>
    <CANVAS id="myCanvas" width="500" height="500" style="border:4px solid black;"></CANVAS>

    <SCRIPt>
        var canvas = document.getElementById("myCanvas");
        var ctx = canvas.getContext("2d");

        // --- LÍNEA DIVISORIA CENTRAL (COLOR NEGRO) ---
        ctx.beginPath();
        ctx.moveTo(0, 250);
        ctx.lineTo(500, 250);
        ctx.strokeStyle = "black"; // Color de la línea cambiado a negro
        ctx.lineWidth = 2;
        ctx.stroke();

        // --- DIBUJAR UN CUADRADO (ARRIBA - COLOR ROJO) ---
        ctx.beginPath();
        ctx.rect(200, 50, 100, 100); 
        ctx.fillStyle = "red";
        ctx.strokeStyle = "red"; // Aseguramos que el borde también sea rojo
        ctx.fill();
        ctx.stroke();

        // --- DIBUJAR UN TRIÁNGULO (ABAJO - COLOR ROJO) ---
        ctx.beginPath();
        ctx.moveTo(250, 300); 
        ctx.lineTo(350, 450); 
        ctx.lineTo(150, 450); 
        ctx.closePath();
        ctx.fillStyle = "red";
        ctx.strokeStyle = "red"; // Aseguramos que el borde también sea rojo
        ctx.fill();
        ctx.stroke();
    </SCRIPt>
    
</body>
</html>
