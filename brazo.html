<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelo Geométrico Interactivo - 2 GDL</title>
    <style>
        :root {
            --primary: #00f2fe;
            --secondary: #4facfe;
            --bg: #050810;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text: #f1f5f9;
        }

        body {
            margin: 0;
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(79, 172, 254, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(0, 242, 254, 0.1) 0%, transparent 40%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            box-sizing: border-box;
        }

        .container {
            max-width: 900px;
            width: 100%;
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 30px;
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            justify-content: center;
            box-sizing: border-box;
        }

        h1 {
            font-size: 2.2rem;
            margin: 0 0 5px 0;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
        }

        p { color: #94a3b8; text-align: center; margin-bottom: 30px; }

        .controls {
            flex: 1;
            min-width: 250px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            justify-content: center;
        }

        .control-group { display: flex; flex-direction: column; }
        
        label { 
            font-size: 0.95rem; 
            font-weight: 600; 
            margin-bottom: 8px; 
            color: var(--text);
        }
        
        label span { color: var(--primary); font-family: monospace; }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 5px;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: var(--primary);
            cursor: pointer;
            box-shadow: 0 0 10px var(--primary);
        }

        .results {
            padding: 15px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            font-family: monospace;
            font-size: 1rem;
            line-height: 1.6;
        }
        
        .results strong { color: var(--secondary); }

        canvas {
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            background-color: rgba(0, 0, 0, 0.2);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
        }

        .btn-back {
            margin-top: 30px;
            color: #94a3b8;
            text-decoration: none;
            font-weight: 500;
            transition: 0.3s;
            font-size: 0.95rem;
        }

        .btn-back:hover { color: var(--primary); }
    </style>
</head>
<body>

    <h1>Modelo Geométrico Directo</h1>
    <p>Simulador cinemático interactivo para un brazo robótico articulado de 2 GDL</p>

    <div class="container">
        <div class="controls">
            <div class="control-group">
                <label>Ángulo Base (q₁): <span id="valQ1">45</span>°</label>
                <input type="range" id="q1" min="-180" max="180" value="45">
            </div>
            
            <div class="control-group">
                <label>Ángulo Codo (q₂): <span id="valQ2">30</span>°</label>
                <input type="range" id="q2" min="-180" max="180" value="30">
            </div>

            <div class="results">
                <strong>[ Cálculo Geométrico ]</strong><br>
                X = L₁·cos(q₁) + L₂·cos(q₁+q₂) = <span id="resX" style="color: var(--primary)">0.00</span><br>
                Y = L₁·sin(q₁) + L₂·sin(q₁+q₂) = <span id="resY" style="color: var(--primary)">0.00</span>
            </div>
        </div>

        <canvas id="robotCanvas" width="360" height="360"></canvas>
    </div>

    <a href="../index.html" class="btn-back">← Volver al Portafolio</a>

    <script>
        const canvas = document.getElementById('robotCanvas');
        const ctx = canvas.getContext('2d');
        
        // Dimensiones físicas escaladas para visualización
        const L1 = 95; 
        const L2 = 75;  

        const originX = canvas.width / 2;
        const originY = canvas.height / 2;

        function resolverGeometria() {
            const q1_deg = parseFloat(document.getElementById('q1').value);
            const q2_deg = parseFloat(document.getElementById('q2').value);

            document.getElementById('valQ1').innerText = q1_deg;
            document.getElementById('valQ2').innerText = q2_deg;

            // Cambiar a radianes para operaciones trigonométricas standard
            const q1 = (q1_deg * Math.PI) / 180;
            const q2 = (q2_deg * Math.PI) / 180;

            // Eslabón 1 (Codo)
            const x1 = L1 * Math.cos(q1);
            const y1 = L1 * Math.sin(q1);

            // Eslabón 2 (Terminal / Punta)
            const x2 = x1 + L2 * Math.cos(q1 + q2);
            const y2 = y1 + L2 * Math.sin(q1 + q2);

            // Mostrar el valor matemático en el bloque de texto
            document.getElementById('resX').innerText = (x2 / 10).toFixed(2);
            document.getElementById('resY').innerText = (y2 / 10).toFixed(2);

            // --- PROCEDIMIENTO GRÁFICO (Canvas) ---
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Rejilla / Ejes cartesianos sutiles
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(0, originY); ctx.lineTo(canvas.width, originY);
            ctx.moveTo(originX, 0); ctx.lineTo(originX, canvas.height);
            ctx.stroke();

            // Mapear coordenadas de la teoría gráfica al espacio de pantalla invertido en Y
            const drawX1 = originX + x1;
            const drawY1 = originY - y1;
            const drawX2 = originX + x2;
            const drawY2 = originY - y2;

            // Línea del eslabón 1
            ctx.strokeStyle = '#4facfe';
            ctx.lineWidth = 6;
            ctx.lineCap = 'round';
            ctx.beginPath(); ctx.moveTo(originX, originY); ctx.lineTo(drawX1, drawY1); ctx.stroke();

            // Línea del eslabón 2
            ctx.strokeStyle = '#00f2fe';
            ctx.beginPath(); ctx.moveTo(drawX1, drawY1); ctx.lineTo(drawX2, drawY2); ctx.stroke();

            // Render de los nodos/articulaciones
            ctx.fillStyle = '#ff4b5c'; // Origen fijo
            ctx.beginPath(); ctx.arc(originX, originY, 6, 0, 2*Math.PI); ctx.fill();

            ctx.fillStyle = '#ffffff'; // Junta intermedia (codo)
            ctx.beginPath(); ctx.arc(drawX1, drawY1, 4, 0, 2*Math.PI); ctx.fill();

            ctx.fillStyle = '#00f2fe'; // Actuador final
            ctx.shadowBlur = 10; ctx.shadowColor = '#00f2fe';
            ctx.beginPath(); ctx.arc(drawX2, drawY2, 5, 0, 2*Math.PI); ctx.fill();
            ctx.shadowBlur = 0; // reset
        }

        document.getElementById('q1').addEventListener('input', resolverGeometria);
        document.getElementById('q2').addEventListener('input', resolverGeometria);
        
        // Ejecución inicial por defecto
        resolverGeometria();
    </script>
</body>
</html>
