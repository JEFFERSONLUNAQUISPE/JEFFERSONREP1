<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ejercicio 1 - Barras Dinámicas</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; flex-direction: column; align-items: left; }
        /* 1. Contenedor para el gráfico  */
        .contenedor { 
            display: flex; 
            align-items: flex-end; 
            height: 300px; 
            gap: 15px; 
            border-bottom: 3px solid #333; 
            border-left: 3px solid #333;
            padding: 20px; 
            width: 400px;
            background-color: #f9f9f9;
        }
        /* 2. Estilo de las 5 barras  */
        .barra { 
            flex: 1; 
            background-color: #3498db; 
            border: 1px solid #2980b9; 
            transition: height 0.5s ease-in-out; 
            display: flex;
            align-items: flex-start;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 12px;
            padding-top: 5px;
        }
    </style>
</head>
<body>
    <h2>Ejercicio 1: Gráfico de Barras Dinámico</h2>
    <h2>REALIZADO POR: Jefferson Luna Quispe</h2>

    <div class="contenedor" id="grafico">
        <div class="barra"></div>
        <div class="barra"></div>
        <div class="barra"></div>
        <div class="barra"></div>
        <div class="barra"></div>
    </div>

    <script>
        // Selección de las barras en el DOM
        const barras = document.querySelectorAll('.barra');

        function actualizarBarras() {
            barras.forEach(barra => {
                // 3. Asignar valores aleatorios entre 10 y 100 
                let valorAleatorio = Math.floor(Math.random() * (100 - 10 + 1)) + 10;
                
                // 4. Actualizar la altura de cada barra con JavaScript [cite: 14]
                barra.style.height = valorAleatorio + "%";
                
                // Mostrar el número del valor dentro de la barra
                barra.textContent = valorAleatorio;
                
                // Cambio de color dinámico si el valor es alto
                barra.style.backgroundColor = valorAleatorio > 70 ? "#e74c3c" : "#3498db";
            });
        }

        // 5. Uso de setInterval() para la actualización continua cada segundo [cite: 9]
        setInterval(actualizarBarras, 1000);

        // Llamada inicial para mostrar datos de inmediato
        actualizarBarras();
    </script>
</body>
</html>
